name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  quality-gates:
    name: Lint, Typecheck, Test, Coverage, Build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          # CI-only test database credentials for the disposable service container.
          POSTGRES_DB: china_slot_test
          POSTGRES_USER: china_slot
          POSTGRES_PASSWORD: china_slot_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U china_slot -d china_slot_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.10.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint all workspaces
        run: npm run lint

      - name: Typecheck all workspaces
        run: npm run typecheck

      - name: Test API and game math
        env:
          TEST_DATABASE_URL: postgres://china_slot:china_slot_password@localhost:5432/china_slot_test
        run: npm test

      - name: Run API PostgreSQL migrations
        env:
          DATABASE_URL: postgres://china_slot:china_slot_password@localhost:5432/china_slot_test
        run: npm run db:migrate -w @china-slot-game/api

      - name: Test API PostgreSQL integration suite
        env:
          TEST_DATABASE_URL: postgres://china_slot:china_slot_password@localhost:5432/china_slot_test
        run: npm run test:integration -w @china-slot-game/api

      - name: Coverage thresholds 80/76 percent
        env:
          TEST_DATABASE_URL: postgres://china_slot:china_slot_password@localhost:5432/china_slot_test
        run: npm run test:coverage

      - name: Build all workspaces
        run: npm run build

  deploy-pages:
    name: Deploy static game to GitHub Pages
    needs: quality-gates
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Write runtime API config
        run: |
          API_BASE_URL="${{ vars.CHINA_SLOT_API_BASE_URL }}"
          if [ -z "$API_BASE_URL" ]; then
            API_BASE_URL="https://china-slot-api.onrender.com"
          fi
          cat > js/runtime-config.js <<EOF
          (function (globalScope) {
              "use strict";

              globalScope.CHINA_SLOT_API_BASE_URL = "$API_BASE_URL";
          })(typeof window !== "undefined" ? window : globalThis);
          EOF

      - name: Prepare static game artifact
        run: |
          mkdir -p pages-dist
          cp index.html pages-dist/
          cp -R js png audio fonts pages-dist/
          touch pages-dist/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload static game
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
