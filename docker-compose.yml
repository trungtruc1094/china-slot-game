services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: china_slot_test
      POSTGRES_USER: china_slot
      POSTGRES_PASSWORD: china_slot_password
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U china_slot -d china_slot_test"]
      interval: 5s
      timeout: 5s
      retries: 10