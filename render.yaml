services:
  - type: web
    name: china-slot-api
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    startCommand: export SEED_ACTIVE_CONFIG=false; npm run db:migrate -w @china-slot-game/api && npm run db:seed-active-config -w @china-slot-game/api && npm start -w @china-slot-game/api
    buildFilter:
      paths:
        - apps/api/**
        - packages/game-math/**
        - package.json
        - package-lock.json
        - .npmrc
        - render.yaml
    healthCheckPath: /api/ready
    envVars:
      - key: NODE_VERSION
        value: 24.10.0
      - key: NODE_ENV
        value: production
      - key: PERSISTENCE_MODE
        value: postgres
      - key: SEED_ACTIVE_CONFIG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: china-slot-db
          property: connectionString
      - key: API_REQUEST_LOGS
        value: "true"
      - key: API_GAMEPLAY_LOGS
        value: "true"

databases:
  - name: china-slot-db
    plan: free
    databaseName: china_slot
    user: china_slot
